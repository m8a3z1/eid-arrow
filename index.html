<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عيد مبارك — بطاقة التهنئة</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Floating background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ══ HEADER ══ -->
  <header class="site-header">
    <div class="header-inner">

      <!-- Fixed logo — not editable by user -->
      <div class="logo-wrap">
        <img src="logo.png" alt="Arrow Creative" class="site-logo" id="siteLogo" />
      </div>

      <div class="header-text">
        <h1 class="site-title">بطاقة عيد مبارك</h1>
        <p class="site-subtitle">أضف اسمك واحفظ تهنئتك</p>
      </div>

    </div>
  </header>

  <!-- ══ MAIN ══ -->
  <main class="main-content">
    <section class="card" id="imageCard">

      <span class="badge badge-tl">✦ عيد ✦</span>
      <span class="badge badge-tr">✦ مبارك ✦</span>

      <!-- IMAGE WRAPPER -->
      <div class="image-wrapper" id="imageWrapper">

        <img
          id="eidImage"
          src="eid.png"
          alt="بطاقة عيد مبارك"
          class="eid-image"
          draggable="false"
        />

        <!--
          NAME OVERLAY — placed over the white rectangle "هذه التهنئة من :"
          Image natural size: 1477 × 2000 px
          Box position in image (measured):
            left   = ~100px  → 100/1477  = 6.77%
            top    = ~1672px → 1672/2000 = 83.6%
            width  = ~410px  → 410/1477  = 27.8%
            height = ~128px  → 128/2000  = 6.4%
          All values are percentages so they scale perfectly at any display size.
        -->
        <div class="name-overlay" id="nameOverlay">
          <span id="nameDisplay"></span>
        </div>

        <!-- Pulsing click hint -->
        <div class="click-hint" id="clickHint">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          انقر على الصورة لكتابة اسمك
        </div>

      </div><!-- /image-wrapper -->

      <!-- INPUT PANEL (hidden until image clicked) -->
      <div class="input-panel" id="inputPanel">

        <div class="input-glass">

          <label for="nameInput" class="input-label">✍️ اكتب اسمك</label>

          <input
            type="text"
            id="nameInput"
            class="name-input"
            placeholder="اكتب اسمك هنا"
            maxlength="35"
            autocomplete="off"
            dir="rtl"
          />

          <!-- Font size slider -->
          <div class="slider-row">
            <label for="fontSizeSlider" class="slider-label">حجم الخط</label>
            <input type="range" id="fontSizeSlider" min="10" max="60" value="22" class="slider" />
            <span id="fontSizeValue" class="slider-value">22</span>
          </div>

          <!-- Custom font upload -->
          <div class="font-row">
            <label class="font-btn" for="fontUpload">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              رفع خط مخصص
            </label>
            <input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2" hidden />
            <span id="fontName" class="font-name"></span>
          </div>

        </div>

        <div class="btn-row">
          <button class="btn btn-preview" id="btnPreview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            معاينة الاسم
          </button>
          <button class="btn btn-download" id="btnDownload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            تحميل الصورة
          </button>
        </div>

      </div><!-- /input-panel -->

    </section>
  </main>

  <footer class="site-footer">كل عام وأنتم بخير ✨</footer>

  <canvas id="downloadCanvas" style="display:none;"></canvas>
  <script src="script.js"></script>
</body>
</html>
